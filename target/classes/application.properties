# ========================================
# Miles of Smiles \u79DF\u8F66\u5BA2\u670D\u7CFB\u7EDF \u2014 \u5E94\u7528\u914D\u7F6E
# ========================================

# ========================================
# \u6587\u4EF6\u4E0A\u4F20\u914D\u7F6E
# ========================================
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB

# ========================================
# LLM \u914D\u7F6E
# ========================================
langchain4j.open-ai.chat-model.api-key=sk-f83d8dabda6a47cda175b5d702cc86a6
langchain4j.open-ai.chat-model.base-url=https://dashscope.aliyuncs.com/compatible-mode/v1
langchain4j.open-ai.chat-model.model-name=MiniMax-M2.5
langchain4j.open-ai.chat-model.strict-tools=true
langchain4j.open-ai.chat-model.temperature=0.0
langchain4j.open-ai.chat-model.timeout=PT60S
langchain4j.open-ai.chat-model.log-requests=true
langchain4j.open-ai.chat-model.log-responses=true

# ========================================
# MySQL \u6570\u636E\u5E93\u914D\u7F6E\uFF08\u4F60\u9700\u8981\u6539\u4E0B\u9762 3 \u9879\uFF09
# ========================================
spring.datasource.url=jdbc:mysql://localhost:3306/Planetitle?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf-8
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=123456

# MyBatis \u914D\u7F6E
mybatis.mapper-locations=classpath:mapper/*.xml
mybatis.type-aliases-package=dev.langchain4j.example.model
mybatis.configuration.map-underscore-to-camel-case=true

# \u6570\u636E\u5E93\u521D\u59CB\u5316
spring.sql.init.mode=always

logging.level.dev.langchain4j=DEBUG