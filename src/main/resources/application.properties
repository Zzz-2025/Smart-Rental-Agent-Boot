# ========================================
# Miles of Smiles \u79DF\u8F66\u5BA2\u670D\u7CFB\u7EDF \u2014 \u5E94\u7528\u914D\u7F6E
# ========================================
# \u8FD9\u4E2A\u6587\u4EF6\u662F\u6574\u4E2A\u9879\u76EE\u7684"\u8BBE\u7F6E\u9762\u677F"\uFF0C\u4FEE\u6539\u540E\u9700\u8981\u91CD\u542F\u5E94\u7528\u751F\u6548\u3002
# ========================================

# ========================================
# \u4E00\u3001Redis / Redisson \u2014 \u5206\u5E03\u5F0F\u9501 \u4E0E \u9650\u6D41
# ========================================
# Redis \u5728\u672C\u9879\u76EE\u4E2D\u627F\u62C5\u4E24\u4E2A\u5173\u952E\u89D2\u8272\uFF1A
#   1. \u5206\u5E03\u5F0F\u9501\uFF1A\u9632\u6B62\u540C\u4E00\u8F86\u8F66\u88AB\u591A\u4EBA\u540C\u65F6\u4E0B\u5355\uFF08\u8D85\u5356\uFF09
#   2. IP \u9650\u6D41\uFF1A\u6BCF IP \u6BCF\u5206\u949F\u6700\u591A 10 \u6B21\u8BF7\u6C42
# \u8FDE\u63A5\u8D85\u65F6\u8BBE\u4E3A 5 \u79D2\uFF0C\u907F\u514D\u56E0\u7F51\u7EDC\u95EE\u9898\u957F\u65F6\u95F4\u963B\u585E
spring.redis.host=localhost
spring.redis.port=6379
spring.redis.timeout=5000ms

# ========================================
# \u4E8C\u3001\u6587\u4EF6\u4E0A\u4F20\u9650\u5236
# ========================================
# \u7528\u6237\u4E0A\u4F20\u8BA2\u5355\u622A\u56FE\u65F6\u7684\u5927\u5C0F\u9650\u5236
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB

# ========================================
# \u4E09\u3001\u5927\u8BED\u8A00\u6A21\u578B\uFF08LLM\uFF09\u914D\u7F6E
# ========================================
# \u8FD9\u91CC\u7528\u7684\u662F\u963F\u91CC\u4E91 DashScope \u7684\u517C\u5BB9\u63A5\u53E3\uFF0C\u6A21\u578B\u662F MiniMax-M2.5\u3002
# \u5982\u679C\u8981\u6362\u6A21\u578B\uFF0C\u6539 model-name \u5373\u53EF\uFF08\u5982 qwen-plus\u3001deepseek-chat\uFF09\u3002
langchain4j.open-ai.chat-model.api-key=yourAPI
langchain4j.open-ai.chat-model.base-url=https://dashscope.aliyuncs.com/compatible-mode/v1
langchain4j.open-ai.chat-model.model-name=MiniMax-M2.5
# strict-tools=true  \u2192 AI \u5FC5\u987B\u4E25\u683C\u8C03\u7528\u5DE5\u5177\uFF0C\u4E0D\u80FD\u8DF3\u8FC7
# temperature=0.0    \u2192 \u8F93\u51FA\u786E\u5B9A\u6027\u6700\u9AD8\uFF0C\u4E0D\u968F\u673A\u53D1\u6325\uFF08\u5BA2\u670D\u573A\u666F\u9700\u8981\u7A33\u5B9A\uFF09
# timeout=PT60S      \u2192 \u6BCF\u6B21\u8BF7\u6C42\u6700\u957F\u7B49 60 \u79D2
langchain4j.open-ai.chat-model.strict-tools=true
langchain4j.open-ai.chat-model.temperature=0.0
langchain4j.open-ai.chat-model.timeout=PT60S
langchain4j.open-ai.chat-model.log-requests=true
langchain4j.open-ai.chat-model.log-responses=true

# ========================================
# \u56DB\u3001MySQL \u6570\u636E\u5E93\u914D\u7F6E
# ========================================
# \u90E8\u7F72\u65F6\u9700\u8981\u6539\u4E0B\u9762 3 \u9879\uFF1Aurl\u3001username\u3001password
spring.datasource.url=jdbc:mysql://localhost:3306/Planetitle?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&characterEncoding=utf-8
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=123456

# MyBatis \u914D\u7F6E\uFF08SQL \u6620\u5C04\u6846\u67B6\uFF09
mybatis.mapper-locations=classpath:mapper/*.xml
mybatis.type-aliases-package=dev.langchain4j.example.model
# \u6570\u636E\u5E93\u5B57\u6BB5\u540D\u662F\u4E0B\u5212\u7EBF(employer_phone)\uFF0CJava \u662F\u9A7C\u5CF0(employerPhone)\uFF0C\u81EA\u52A8\u4E92\u8F6C
mybatis.configuration.map-underscore-to-camel-case=true

# \u5E94\u7528\u542F\u52A8\u65F6\u81EA\u52A8\u6267\u884C schema.sql\uFF08\u5EFA\u8868\uFF09\u548C data.sql\uFF08\u521D\u59CB\u5316\u6570\u636E\uFF09
spring.sql.init.mode=always

# \u5F00\u53D1\u8C03\u8BD5\uFF1A\u6253\u5370 LangChain4j \u7684\u8BE6\u7EC6\u65E5\u5FD7
logging.level.dev.langchain4j=DEBUG

# ========================================
# \u4E94\u3001Langfuse \u53EF\u89C2\u6D4B\u6027\u914D\u7F6E\uFF08OpenTelemetry\uFF09
# ========================================
# \u586B\u5165\u4F60\u7684 Langfuse \u9879\u76EE\u51ED\u636E\u5373\u53EF\u542F\u7528\u8FFD\u8E2A\uFF0C\u7559\u7A7A\u5219\u81EA\u52A8\u7981\u7528
langfuse.public-key=yourpublicKey
langfuse.secret-key=yoursecretKey
langfuse.host=https://cloud.langfuse.com
