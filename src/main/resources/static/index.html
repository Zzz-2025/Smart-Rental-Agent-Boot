<!--
    ================================================================
    Miles of Smiles 客服聊天界面
    ================================================================

    这是用户看到的"聊天窗口"，用原生 HTML/CSS/JavaScript 编写，
    不需要任何前端框架（React/Vue），直接在浏览器打开即可使用。

    页面结构（从上到下）：
      1. 顶部标题栏 — "Miles of Smiles 客服"，带新会话按钮
      2. 中间聊天区 — 显示对话历史，支持 Markdown 渲染
      3. 底部输入区 — 文本输入框 + 图片上传按钮 + 发送按钮

    数据流：
      用户输入文字 → fetch POST /customerSupportAgent → 返回 AI 回复 → 显示
      用户上传图片 → fetch POST /customerSupportAgent/upload → 视觉识别 → AI 回复

    渲染引擎：marked.js（CDN 引入），将 AI 返回的 Markdown 转换成
    格式化的 HTML（表格、加粗、列表、代码块等）。
-->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Miles of Smiles - 客服助手</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #f0f2f5;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .chat-container {
            width: 100%;
            max-width: 800px;
            height: 90vh;
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-header {
            background: linear-gradient(135deg, #1a73e8, #1557b0);
            color: #fff;
            padding: 20px 24px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .chat-header .avatar {
            width: 44px; height: 44px;
            background: rgba(255,255,255,0.2);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 22px;
        }

        .chat-header .info h1 { font-size: 18px; font-weight: 600; }
        .chat-header .info span { font-size: 13px; opacity: 0.85; }

        .chat-messages {
            flex: 1; overflow-y: auto;
            padding: 20px 24px;
            display: flex; flex-direction: column; gap: 16px;
        }

        .chat-messages::-webkit-scrollbar { width: 6px; }
        .chat-messages::-webkit-scrollbar-track { background: transparent; }
        .chat-messages::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 3px; }

        .message {
            display: flex; gap: 10px; max-width: 80%;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user { align-self: flex-end; flex-direction: row-reverse; }

        .message .bubble-avatar {
            width: 36px; height: 36px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 16px; flex-shrink: 0;
        }

        .message.agent .bubble-avatar { background: #e8f0fe; color: #1a73e8; }
        .message.user .bubble-avatar { background: #1a73e8; color: #fff; }

        .message .bubble {
            padding: 12px 16px; border-radius: 16px;
            font-size: 15px; line-height: 1.65; word-break: break-word;
        }

        .bubble p { margin: 0 0 6px; }
        .bubble p:last-child { margin-bottom: 0; }
        .bubble ul, .bubble ol { margin: 4px 0; padding-left: 20px; }
        .bubble li { margin-bottom: 2px; }
        .bubble strong { font-weight: 600; }
        .bubble code {
            background: #e5e7eb; padding: 1px 5px; border-radius: 4px;
            font-size: 13px; font-family: 'SF Mono', 'Fira Code', monospace;
        }
        .bubble pre {
            background: #1f2937; color: #f3f4f6;
            padding: 12px 16px; border-radius: 8px; overflow-x: auto;
            font-size: 13px; font-family: 'SF Mono', 'Fira Code', monospace;
            margin: 6px 0; line-height: 1.45;
        }
        .bubble pre code { background: none; padding: 0; font-size: inherit; }
        .bubble table {
            width: 100%; border-collapse: collapse;
            margin: 8px 0; font-size: 14px;
        }
        .bubble th, .bubble td {
            padding: 8px 12px; text-align: left;
            border: 1px solid #d1d5db;
        }
        .bubble th {
            background: #e5e7eb; font-weight: 600;
        }
        .bubble tr:nth-child(even) td {
            background: #f9fafb;
        }

        .message.agent .bubble {
            background: #f3f4f6; color: #1f2937;
            border-bottom-left-radius: 4px;
        }

        .message.user .bubble {
            background: #1a73e8; color: #fff;
            border-bottom-right-radius: 4px;
        }

        .typing-indicator {
            display: flex; gap: 10px; max-width: 80%; align-items: center;
        }

        .typing-indicator .bubble-avatar {
            width: 36px; height: 36px;
            border-radius: 50%; background: #e8f0fe; color: #1a73e8;
            display: flex; align-items: center; justify-content: center;
            font-size: 16px; flex-shrink: 0;
        }

        .typing-indicator .dots {
            display: flex; gap: 4px;
            padding: 14px 18px; background: #f3f4f6;
            border-radius: 16px; border-bottom-left-radius: 4px;
        }

        .typing-indicator .dots span {
            width: 8px; height: 8px; background: #9ca3af;
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .typing-indicator .dots span:nth-child(1) { animation-delay: -0.32s; }
        .typing-indicator .dots span:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0.6); }
            40% { transform: scale(1); }
        }

        .chat-input-area {
            padding: 16px 24px; border-top: 1px solid #e5e7eb;
            display: flex; gap: 12px; align-items: flex-end;
        }

        .chat-input-area input {
            flex: 1; padding: 12px 18px;
            border: 1px solid #d1d5db; border-radius: 24px;
            font-size: 15px; outline: none;
            transition: border-color 0.2s;
        }

        .chat-input-area input:focus {
            border-color: #1a73e8;
            box-shadow: 0 0 0 3px rgba(26,115,232,0.1);
        }

        .chat-input-area button {
            width: 44px; height: 44px; border-radius: 50%;
            border: none; background: #1a73e8; color: #fff;
            font-size: 18px; cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            flex-shrink: 0;
            display: flex; align-items: center; justify-content: center;
        }

        .chat-input-area button:hover { background: #1557b0; }
        .chat-input-area button:active { transform: scale(0.95); }
        .chat-input-area button:disabled { background: #9ca3af; cursor: not-allowed; }

        .new-session-btn {
            background: none; border: 1px solid rgba(255,255,255,0.3);
            color: #fff; padding: 6px 14px; border-radius: 16px;
            font-size: 13px; cursor: pointer; margin-left: auto;
            transition: background 0.2s;
        }

        .new-session-btn:hover { background: rgba(255,255,255,0.15); }

        .error-banner {
            background: #fef2f2; color: #dc2626;
            padding: 10px 24px; font-size: 13px;
            text-align: center; display: none;
        }
        .error-banner.show { display: block; }

        .image-preview-area { padding: 0 24px 8px; display: none; }
        .image-preview-area.show { display: flex; align-items: center; gap: 8px; }
        .image-preview-area img {
            max-height: 80px; max-width: 200px;
            border-radius: 8px; border: 1px solid #d1d5db; object-fit: cover;
        }
        .image-preview-area .file-name {
            font-size: 12px; color: #6b7280; flex: 1;
            overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
        }
        .image-preview-area .remove-btn {
            background: none; border: none; color: #9ca3af;
            cursor: pointer; font-size: 20px; padding: 4px; line-height: 1;
        }
        .image-preview-area .remove-btn:hover { color: #dc2626; }

        .chat-input-area .attach-btn {
            width: 44px; height: 44px; border-radius: 50%;
            border: 1px solid #d1d5db; background: #fff;
            color: #6b7280; font-size: 20px; cursor: pointer; flex-shrink: 0;
            display: flex; align-items: center; justify-content: center;
            transition: background 0.2s, border-color 0.2s;
        }
        .chat-input-area .attach-btn:hover { background: #f3f4f6; border-color: #1a73e8; color: #1a73e8; }

    </style>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <div class="avatar">🚗</div>
            <div class="info">
                <h1>Miles of Smiles 客服</h1>
                <span>在线 · 随时为您服务</span>
            </div>
            <button class="new-session-btn" onclick="newSession()" title="开始新会话">新会话</button>
        </div>

        <div class="error-banner" id="errorBanner"></div>

        <div class="chat-messages" id="chatMessages">
            <div class="message agent">
                <div class="bubble-avatar">🤖</div>
                <div class="bubble">
                    <p>您好！我是 Roger，Miles of Smiles 的智能客服助手，可以为您提供以下服务：<br>
                    🚗 <strong>推荐车型</strong> — 根据人数、预算、用途帮您挑选<br>
                    ✏️ <strong>创建预订</strong> — 选定车辆，快速下单<br>
                    🔍 <strong>查询订单</strong> — 按订单号和手机/身份证号查询<br>
                    ⏰ <strong>延期还车</strong> — 延长租车期限<br>
                    ❌ <strong>取消订单</strong> — 取消已有预订<br>
                    📋 <strong>政策咨询</strong> — 保险条款、还车规则等<br>
                    请问有什么可以帮您的？</p>
                </div>
            </div>
        </div>

        <div class="image-preview-area" id="imagePreviewArea">
            <img id="imagePreview" src="" alt="Preview">
            <span class="file-name" id="imageFileName"></span>
            <button class="remove-btn" onclick="removeImage()" title="移除图片">✕</button>
        </div>

        <input type="file" id="imageInput" accept="image/png,image/jpeg,image/gif,image/webp,image/bmp"
               style="display:none" onchange="handleImageSelect(event)">

        <div class="chat-input-area">
            <button class="attach-btn" onclick="document.getElementById('imageInput').click()" title="上传图片">📎</button>
            <input type="text" id="userInput" placeholder="输入您的问题..." autocomplete="off"
                   onkeydown="if(event.key==='Enter') sendMessage()" />
            <button id="sendBtn" onclick="sendMessage()" title="发送">➤</button>
        </div>
    </div>

    <script>
        const CHAT_URL = '/customerSupportAgent';
        const UPLOAD_URL = '/customerSupportAgent/upload';
        const chatMessages = document.getElementById('chatMessages');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const errorBanner = document.getElementById('errorBanner');

        let pendingImageFile = null;
        let isSending = false;

        function handleImageSelect(event) {
            const file = event.target.files[0];
            if (!file) return;
            const allowedTypes = ['image/png','image/jpeg','image/gif','image/webp','image/bmp'];
            if (!allowedTypes.includes(file.type)) {
                showError('不支持此图片格式: ' + (file.type || '未知') + '。支持 PNG, JPEG, GIF, WebP, BMP');
                event.target.value = '';
                return;
            }
            pendingImageFile = file;
            const previewArea = document.getElementById('imagePreviewArea');
            const previewImg = document.getElementById('imagePreview');
            const fileName = document.getElementById('imageFileName');
            previewImg.src = URL.createObjectURL(file);
            fileName.textContent = file.name;
            previewArea.classList.add('show');
        }

        function removeImage() {
            pendingImageFile = null;
            document.getElementById('imageInput').value = '';
            document.getElementById('imagePreviewArea').classList.remove('show');
            const previewImg = document.getElementById('imagePreview');
            if (previewImg.src) { URL.revokeObjectURL(previewImg.src); previewImg.src = ''; }
        }

        function getSessionId() {
            let sessionId = localStorage.getItem('chatSessionId');
            if (!sessionId) {
                sessionId = 'session-' + Date.now() + '-' + Math.random().toString(36).slice(2,8);
                localStorage.setItem('chatSessionId', sessionId);
            }
            return sessionId;
        }

        function newSession() {
            localStorage.removeItem('chatSessionId');
            chatMessages.innerHTML = '';
            location.reload();
        }

        function showError(msg) {
            errorBanner.textContent = msg;
            errorBanner.classList.add('show');
            setTimeout(() => errorBanner.classList.remove('show'), 6000);
        }

        function scrollToBottom() {
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function createMessageBubble(role) {
            const div = document.createElement('div');
            div.className = 'message ' + role;
            const avatar = role === 'user' ? '👤' : '🤖';
            div.innerHTML = '<div class="bubble-avatar">' + avatar + '</div>'
                          + '<div class="bubble"></div>';
            chatMessages.appendChild(div);
            return div.querySelector('.bubble');
        }

        function showTyping() {
            const div = document.createElement('div');
            div.className = 'typing-indicator';
            div.id = 'typingIndicator';
            div.innerHTML = '<div class="bubble-avatar">🤖</div>'
                          + '<div class="dots"><span></span><span></span><span></span></div>';
            chatMessages.appendChild(div);
            scrollToBottom();
        }

        function hideTyping() {
            const el = document.getElementById('typingIndicator');
            if (el) el.remove();
        }

        function renderMd(text) {
            return marked.parse(text);
        }

        async function sendMessage() {
            const message = userInput.value.trim();
            if (!message && !pendingImageFile) return;
            if (isSending) return;

            const finalMessage = message || '请查看这张图片';
            userInput.value = '';
            setInputDisabled(true);
            isSending = true;

            const displayText = pendingImageFile
                ? '[📷 ' + pendingImageFile.name + '] ' + finalMessage
                : finalMessage;
            createMessageBubble('user').innerHTML = renderMd(displayText);

            // 图片上传走原有非流式接口
            if (pendingImageFile) {
                showTyping();
                try {
                    const formData = new FormData();
                    formData.append('sessionId', getSessionId());
                    formData.append('userMessage', finalMessage);
                    formData.append('file', pendingImageFile);

                    const response = await fetch(UPLOAD_URL, { method: 'POST', body: formData });
                    if (!response.ok) {
                        if (response.status === 429) {
                            throw new Error('请求过于频繁，请稍后再试（每分钟限10次）。');
                        }
                        throw new Error('服务器错误: ' + response.status);
                    }
                    const text = await response.text();
                    hideTyping();
                    createMessageBubble('agent').innerHTML = renderMd(text);
                    removeImage();
                } catch (err) {
                    hideTyping();
                    showError('发送失败: ' + err.message);
                } finally {
                    setInputDisabled(false);
                    isSending = false;
                    userInput.focus();
                }
                return;
            }

            // ─────────── 纯文本：普通请求 ───────────
            showTyping();
            try {
                const response = await fetch(CHAT_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        sessionId: getSessionId(),
                        userMessage: finalMessage
                    })
                });

                if (!response.ok) {
                    if (response.status === 429) {
                        throw new Error('请求过于频繁，请稍后再试（每分钟限10次）。');
                    }
                    throw new Error('服务器错误: ' + response.status);
                }

                const text = await response.text();
                hideTyping();
                createMessageBubble('agent').innerHTML = renderMd(text);
            } catch (err) {
                hideTyping();
                showError('发送失败: ' + err.message);
            } finally {
                setInputDisabled(false);
                isSending = false;
                userInput.focus();
                scrollToBottom();
            }
        }

        function setInputDisabled(disabled) {
            userInput.disabled = disabled;
            sendBtn.disabled = disabled;
        }

        userInput.focus();
        scrollToBottom();
    </script>
</body>
</html>
